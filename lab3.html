<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Full Screen Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            /* แก้ให้ซ่อนเฉพาะแนวนอน เพื่อให้จอเล็กสามารถไถเลื่อนดูเนื้อหาแนวตั้งได้ */
            overflow-x: hidden;
        }

        .bg-blue-dark {
            background-color: #2c3e50;
        }

        .border-dashed {
            border: 2px dashed #bdc3c7;
        }
    </style>
</head>

<body>

    <div class="container-fluid vh-100 p-0">
        <div class="row g-0 min-vh-100">
            <nav class="col-md-3 bg-blue-dark text-white p-4">
                <h2 class="h4 fw-bold">เมนูหลัก</h2>
                <ul class="list-unstyled d-flex flex-column gap-3 fs-5 mt-4">
                    <li>📋 ภาพรวม</li>
                    <li>📊 รายงาน</li>
                    <li>⚙️ ตั้งค่า</li>
                </ul>
            </nav>

            <main class="col-md-9 p-4 d-flex flex-column">

                <div class="bg-white rounded shadow-sm p-4 mb-4 fs-5 fw-bold">
                    แดชบอร์ดสรุปยอดขายประจำเดือน
                </div>

                <div class="row g-4 flex-grow-1 pb-2">

                    <div class="col-md-6">
                        <div class="bg-white rounded shadow-sm p-4 d-flex 
                        align-items-center justify-content-center h-100 border-   
                        dashed text-secondary fs-5" style="min-height: 200px;">
                            <div>📋 พื้นที่แสดงตารางข้อมูล (Data Table)</div>
                        </div>
                    </div>



                    <div class="col-md-6">
                        <div class="bg-white rounded shadow-sm p-4 d-flex 
                        align-items-center justify-content-center h-100 
                        border-dashed text-secondary fs-5" style="min-height: 200px;">
                            <div>📈 พื้นที่แสดงกราฟ (Chart / Graph)</div>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

</body>

</html>
